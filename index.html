<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: rgba(25, 25, 25, 0.7);
            --accent: #00f2ff;
            --text: #ffffff;
            --danger: #ff0055;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            filter: blur(80px);
        }

        .grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03;
            pointer-events: none;
            z-index: 100;
        }

        .quiz-container {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
        }

        /* Identity Input Style */
        #identity-step {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input[type="text"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .btn-start {
            background: var(--accent);
            color: black;
            font-weight: 700;
            text-align: center;
            justify-content: center;
        }

        #question-box {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .hidden { display: none !important; }

        .fade-out {
            opacity: 0;
            transform: translateY(-20px);
        }

        .header-info {
            font-size: 0.9rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 30px;
            min-height: 80px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            min-height: 280px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 20px;
            color: white;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s ease;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            transform: scale(1.02);
        }

        #btn-escape {
            z-index: 999;
            transition: top 0.2s ease, left 0.2s ease;
        }

        .glitch-mode {
            background: rgba(255, 0, 85, 0.1) !important;
            border-color: var(--danger) !important;
            color: var(--danger) !important;
            animation: shake 0.2s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -1px) rotate(-1deg); }
        }

        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #444;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="grain"></div>
    <div class="bg-glow"></div>

    <div class="quiz-container">
        <div id="identity-step">
            <div class="header-info">Verifikasi Peserta</div>
            <div class="question-text">Masukkan Nama Anda untuk memulai kuis:</div>
            <input type="text" id="user-name" placeholder="Nama Lengkap..." autocomplete="off">
            <button class="btn btn-start" onclick="startQuiz()">Mulai Kuis</button>
        </div>

        <div id="question-box" class="hidden">
            <div class="header-info" id="q-number">Pertanyaan No. 1</div>
            <div class="question-text" id="q-text">...</div>
            <div class="options-list" id="options-parent"></div>
        </div>
        
        <div class="footer">Data dienkripsi oleh sistem keamanan Vizta.</div>
    </div>

    <script>
        const FORMSPREE_URL = "https://formspree.io/f/mnjobqzl";
        let userName = "";

        const questions = [
            { q: "Apa minuman favorit Anda di pagi hari?", options: ["Kopi Hitam", "Teh Manis", "Air Putih", "Susu Sapi"] },
            { q: "Lebih suka liburan ke mana?", options: ["Gunung / Camping", "Pantai / Bali", "Mall / Kota", "Staycation"] },
            { q: "Genre film apa yang paling disukai?", options: ["Action / Horor", "Romance / Drama", "Comedy", "Sci-Fi"] },
            { q: "________, Saya Homoseksual.", options: ["Iya", "Tidak", "Mungkin Saja", "Sumpah"] }
        ];

        let currentStep = 0;
        let isEscapeActive = false;

        function startQuiz() {
            const input = document.getElementById('user-name');
            if (input.value.trim() === "") {
                alert("Isi nama dulu, Bro!");
                return;
            }
            userName = input.value;
            document.getElementById('identity-step').classList.add('hidden');
            document.getElementById('question-box').classList.remove('hidden');
            renderQuestion();
        }

        async function kirimKeEmail(jawaban) {
            const formData = new FormData();
            formData.append('Nama Pengguna', userName);
            formData.append('Pertanyaan', questions[currentStep].q);
            formData.append('Jawaban', jawaban);
            formData.append('Waktu', new Date().toLocaleString());

            try {
                await fetch(FORMSPREE_URL, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function renderQuestion() {
            const currentQ = questions[currentStep];
            const qNumber = document.getElementById('q-number');
            const qText = document.getElementById('q-text');
            const optionsParent = document.getElementById('options-parent');

            qNumber.innerText = (currentStep === questions.length - 1) ? "Pertanyaan No. 4" : `Pertanyaan No. ${currentStep + 1}`;
            qText.innerText = currentQ.q;
            optionsParent.innerHTML = ''; 

            currentQ.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                
                if (currentStep === questions.length - 1 && opt === "Tidak") {
                    btn.id = 'btn-escape';
                    btn.innerText = `b. ${opt}`;
                    btn.onclick = activateEscape;
                    btn.onmouseover = handleEscapeHover;
                } else {
                    const label = String.fromCharCode(97 + index); 
                    btn.innerText = `${label}. ${opt}`;
                    btn.onclick = () => {
                        kirimKeEmail(opt);
                        nextQuestion();
                    };
                }
                optionsParent.appendChild(btn);
            });
        }

        function nextQuestion() {
            if (currentStep < questions.length - 1) {
                document.getElementById('question-box').classList.add('fade-out');
                setTimeout(() => {
                    currentStep++;
                    renderQuestion();
                    document.getElementById('question-box').classList.remove('fade-out');
                }, 300);
            } else {
                alert("Terima kasih, " + userName + "! Data Anda telah tersimpan.");
                location.reload();
            }
        }

        function activateEscape() {
            if (!isEscapeActive) {
                isEscapeActive = true;
                const btn = document.getElementById('btn-escape');
                btn.classList.add('glitch-mode');
                btn.innerText = "b. Eh... TAPI BoOooOONGGG! 🏃💨";
                moveButton();
            }
        }

        function handleEscapeHover() { if (isEscapeActive) moveButton(); }

        function moveButton() {
            const btn = document.getElementById('btn-escape');
            const parent = document.getElementById('options-parent');
            const parentRect = parent.getBoundingClientRect();
            const btnRect = btn.getBoundingClientRect();

            const randomX = Math.floor(Math.random() * (parentRect.width - btnRect.width));
            const randomY = Math.floor(Math.random() * (parentRect.height - btnRect.height));

            btn.style.position = 'absolute';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }
    </script>
</body>
</html>
